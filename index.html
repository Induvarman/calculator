<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calculator</title>
  <link rel="shortcut icon" href="images/calculator.png" type="image/x-icon">

  <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
  <div class="header">
    <div class="logo">CALCULATOR</div>
    <ul class="links">
      <li><a href="https://induvarman.github.io/etch-a-sketch/index.html">EAS Project</a></li>
      <li><a href="https://induvarman.github.io/rock-paper-scissors-game/index.html">RPS Project</a></li>
    </ul>
  </div>

  <div class="container">
    <div class="calculator">
      <div class="display">
        <div class="input"></div>
        <div class="result">0</div>
      </div>

      <div class="keyboard">
        <div class="row">
          <button class="btn-fn">⌫</button>
          <button class="btn-fn">AC</button>
          <button class="btn-fn">%</button>
          <button class="btn-op">➗</button>
        </div>

        <div class="row">
          <button class="btn">7</button>
          <button class="btn">8</button>
          <button class="btn">9</button>
          <button class="btn-op">×</button>
        </div>

        <div class="row">
          <button class="btn">4</button>
          <button class="btn">5</button>
          <button class="btn">6</button>
          <button class="btn-op">-</button>
        </div>

        <div class="row">
          <button class="btn">1</button>
          <button class="btn">2</button>
          <button class="btn">3</button>
          <button class="btn-op">+</button>
        </div>
        
        <div class="row">
          <button class="btn-fn">±</button>
          <button class="btn">0</button>
          <button class="btn-dec">.</button>
          <button class="btn-op">=</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>copyrights ©2026 All rights reserved</p>
    <a href="https://github.com/Induvarman" target="_blank"><img src="images/github-brands-solid.svg" width="24px"></a>
  </div>
</body>
</html>
